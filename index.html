<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай число</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/script-refactor.js"></script>
</head>
<body>
    <div class="main__container">
        <div class="main__game-window" id="messageWindow">
            <p>Введите число от 1 до 100</p>
        </div>
        <div class="main__attempt-display" id="attemptsDisplay">Попыток: 0</div>
        <input type="text" id="userGuess" placeholder="Введите число">
        <input type="button" id="checkButton" value="Проверить" onclick="checkGuess()">
        <input type="button" value="Новая игра" onclick="startNewGame()">
        <input type="button" value="Отменить ход" onclick="undoLastGuess()">
        <div class="record" id="recordDisplay">Рекорд: </div>
        <div class="main__history-massive" id="historyList"></div>
    </div>
</body>
</html>
